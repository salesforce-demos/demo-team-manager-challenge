<template>
  <div class="main-site">
    <!-- Background Image -->
    <div class="main-site__background">
      <img src={landingImg} alt="background" />
    </div>

    <!-- Navigation Bar -->
    <nav class="main-site__nav">
      <div class="nav-content">
        <img class="nav-content__logo" src={siteLogo} alt="Site Logo" />

            <div key={item.text} class="nav-item">
              <span class="nav-text">{item.text}</span>
              <img if:true={item.hasDropdown} src={siteDropdown} alt="Dropdown" />
            </div>
          </template>
        </div>
        <div class="nav-content__nav-items">
          <div class="nav-item">
            <span class="nav-text">Contact</span>
          </div>
          <div class="nav-item">
            <!-- Globe Icon -->
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#clip0_3003_2568)"><path d="M6.99957 0C3.13382 0 0 3.13412 0 7.00025C0 10.8664 3.13382 14.0005 6.99957 14.0005C10.8654 14.0005 13.9991 10.8664 13.9991 7.00025C13.9937 3.13639 10.863 0.00547678 6.99957 0ZM12.8756 6.4633H10.39C10.39 4.72793 9.95958 3.01965 9.1372 1.49153C11.2243 2.30702 12.6716 4.23173 12.8756 6.4633ZM6.99957 12.9266C5.96555 12.9266 4.84203 10.6496 4.72273 7.54715H9.2764C9.15714 10.6496 8.01869 12.9266 6.99957 12.9266ZM4.72273 6.4633C4.84203 3.35098 5.96555 1.09379 6.99957 1.09379C8.03361 1.09379 9.15714 3.35098 9.2764 6.4633H4.72273ZM4.85695 1.49153C4.04324 3.02189 3.62137 4.73004 3.62904 6.4633H1.1434C1.34199 4.23724 2.77889 2.31349 4.85695 1.49153ZM1.12352 7.54715H3.60916C3.60065 9.28055 4.02257 10.9889 4.83707 12.5189C2.75754 11.6989 1.31984 9.77411 1.12352 7.54715ZM9.1372 12.5189C9.94961 10.9968 10.3732 9.2974 10.3701 7.57201H12.8558C12.6395 9.78113 11.203 11.6825 9.1372 12.4941V12.5189Z" fill="white"/></g><defs><clipPath id="clip0_3003_2568"><rect width="14" height="14" fill="white"/></clipPath></defs></svg>
            <span class="nav-text">United Kingdom</span>
          </div>
          <div class="nav-item">
            <!-- Search Icon -->
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M11.3698 10.5507C12.2024 9.54183 12.7024 8.24926 12.7024 6.84012C12.7024 3.61471 10.0827 1 6.8512 1C3.61967 1 1 3.61471 1 6.84012C1 10.0655 3.61967 12.6802 6.8512 12.6802C8.24944 12.6802 9.53314 12.1907 10.5396 11.374L14.0011 14.8289C14.2296 15.057 14.6001 15.057 14.8286 14.8289C15.0571 14.6009 15.0571 14.2311 14.8286 14.003L11.3698 10.5507ZM11.5322 6.84012C11.5322 9.42044 9.43642 11.5122 6.8512 11.5122C4.26598 11.5122 2.17024 9.42044 2.17024 6.84012C2.17024 4.25979 4.26598 2.16802 6.8512 2.16802C9.43642 2.16802 11.5322 4.25979 11.5322 6.84012Z" fill="white"/></svg>
          </div>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <div class="main-site__hero">
      <div class="hero-content">
        <img src={arrowGif} alt="Arrow" class="hero-overlay hero-overlay--left" />
        <h2 class="hero-text">Create more <span class="hero-text__highlight">smiles</span> with every<br/>sip and every bite</h2>
        <img src={halfBurstGif} alt="Burst" class="hero-overlay hero-overlay--right" />
      </div>
    </div>

    <!-- Chat Button -->
    <div class="main__button">
      <img data-show-chat={showChat} onclick={handleStartChat} src={chatIcon} alt="Chat" />
    </div>

    <!-- Chat -->
    <div class="main__chat" data-show={showChat}>
      <c-pepsi-main-site-chat onclosechat={handleCloseChat}></c-pepsi-main-site-chat>
    </div>
  </div>
</template>
